[project]
name = "linalg-zero"
version = "0.0.1"
description = "This repository provides tools to generate a linear algebra dataset and code to train an open-source pre-trained model. Our goal is to explore the model's potential for emergent reasoning, inspired by the Deepseek-R1 paper."
authors = [{ name = "Razvan Florian Vasile", email = "atomwalk@duck.com" }]
readme = "README.md"
keywords = ['python']
requires-python = ">=3.10,<3.13"
classifiers = [
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "ddgs>=9.11.2",
    "gradio>=6.9.0",
    "spaces>=0.47.0",
]

# These are false positives, the libraries are actually used (i.e. see launch_server.py)
[tool.deptry]
exclude = [
    ".venv",
    "unsloth_compiled_cache/",
]
ignore = ["DEP004"]

[tool.deptry.per_rule_ignores]
# DEP002: defined as a dependency but not used in the codebase
DEP002 = [
    "starlette", "sse-starlette", "starlette-context", "pydantic-settings", "uvicorn", "llama-cpp-python", "vllm",
    "bs4", "verl", "ipykernel", "bitsandbytes", "fastapi", "anyio", "instructor", "outlines", "pydantic",
    "liger-kernel", "deepspeed", "flashinfer-python", "triton", "unsloth-zoo"
]
# DEP001: imported but listed only in dependency groups or as transient dependencies
DEP001 = [
    "art",
    "dotenv",
    "hydra",
    "litellm",
    "omegaconf",
    "openai",
    "tenacity",
    "torch",
]
# There are some problems installing torch directly, however it is being made available as a transient dependency.
# DEP003: imported but it is a transient dependency
DEP003 = [
    "torch", "openai", "pandas", "safetensors", "litellm", "tenacity", "dotenv", "omegaconf"
]

[tool.uv]
# Instead of using --no-build-isolation from the command line
no-build-isolation-package = ["xformers"]
constraint-dependencies = [
  "torch",
]

# Declare that data-gen, grpo, and sft groups have conflicting dependencies
# This allows uv to create a universal resolution knowing they are mutually exclusive
conflicts = [
  [
    { group = "data-gen" },
    { group = "grpo" },
    { group = "sft" },
  ],
]

# PyTorch configuration - users can override by setting UV_TORCH_BACKEND
# Default: CPU builds for non-Linux, CUDA 12.8 for Linux
# See: https://docs.astral.sh/uv/guides/integration/pytorch/
[tool.uv.sources]
torch = [
  { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
  { index = "pytorch-cu129", marker = "sys_platform == 'linux'" },
]
torchvision = [
  { index = "pytorch-cpu", marker = "sys_platform != 'linux'" },
  { index = "pytorch-cu129", marker = "sys_platform == 'linux'" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu129"
url = "https://download.pytorch.org/whl/cu129"
explicit = true

[project.urls]
Homepage = "https://atomwalk12.github.io/linalg-zero/"
Repository = "https://github.com/atomwalk12/linalg-zero"
Documentation = "https://atomwalk12.github.io/linalg-zero/"

[dependency-groups]
dev = [
    "pre-commit>=2.20.0",
    "tox-uv>=1.11.3",
    "deptry>=0.23.0",
    "mypy>=1.16.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.11.5",
    "mkdocs>=1.4.2",
    "mkdocs-material>=8.5.10",
    "mkdocstrings[python]>=0.26.1",
    "python-semantic-release>=10.1.0",
    "types-pyyaml>=6.0.12.20250516",
    "types-tqdm>=4.67.0.20250516",
]

test = [
    "math-verify>=0.8.0",
    "numpy>=1.26.4",
    "pyyaml>=6.0.2",
    "sympy==1.14.0",
    "trl>=0.20.0,<0.23",
]

# Dependencies for dataset generation and distillation
# Install with: uv sync --group data-gen
data-gen = [
    "anyio>=4.9.0",
    "distilabel[openai,outlines,instructor]>=1.5.3",
    "datasets>=4.0.0",
    "outlines>=0.1.0",
    "instructor>=1.9.2",
    "transformers==4.55.2",
    "trl==0.22.2",
    "fastapi>=0.116.1",
    "pydantic-settings>=2.10.1",
    "sse-starlette>=2.4.1",
    "starlette>=0.47.1",
    "starlette-context>=0.4.0",
    "uvicorn>=0.35.0",
    "ipykernel>=6.29.5",
    "bitsandbytes>=0.46.1",
    "llama-cpp-python==0.3.13",
    "vllm>=0.10.2",
    "bs4>=0.0.2",
    "verl>=0.5.0",
    "math-verify>=0.8.0",
    "argilla>=2.8.0",
    "pydantic>=2.11.7",
    "typing-extensions>=4.14.1",
    "liger-kernel>=0.6.1",
    "deepspeed>=0.17.3",
    "huggingface-hub>=0.33.4",
    "pytest>=7.2.0",
    "sympy==1.14.0",
    "pyyaml>=6.0.2",
    "numpy>=1.26.4",
    "matplotlib>=3.10.6",
    "flashinfer-python>=0.3.1",
    "wandb>=0.21.0",
    "tqdm>=4.67.1",
    "triton>=3.3.0",
]

sft = [
    "accelerate==1.11.0",
    "datasets>=4.4.1",
    "distilabel>=1.5.3",
    "math-verify>=0.8.0",
    "trl==0.22.2",
    "unsloth>=2025.10.3",
    "unsloth-zoo>=2025.10.3",
    "wandb>=0.23.0",
    "transformers==4.56.2",
    "weave>=0.51.56",
    "ninja>=1.13.0",
]

# Dependencies for GRPO training with openpipe-art
# Install with: uv sync --group grpo
# IMPORTANT: These versions CONFLICT with data-gen group - use separate sync!
grpo = [
    "openpipe-art==0.5.3",
    # The following are pinned dependencies required by art library
    "distilabel[openai,outlines,instructor]>=1.5.3",
    "math-verify",
    "vllm==0.10.0",
    "transformers>=4.53.2",
    "trl==0.20.0",
    "unsloth==2025.10.3",
    "unsloth-zoo==2025.10.3",
    "bitsandbytes>=0.45.2",
    "peft>=0.14.0",
    "accelerate>=1.7.0",
    "torchao>=0.12.0,<0.14.0", # 0.13.0 supports torch 2.7.1
    "polars>=1.34.0",
    "torchtune>=0.6.1",
    "setproctitle>=1.3.7",
    "tblib>=3.1.0",
    "weave==0.51.56",
    "gql<4",
    "langfuse>=3.8.1",
    "openpipe>=1.3.1",
    "hydra-core>=1.3.2",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.setuptools]
py-modules = ["linalg_zero"]

[tool.mypy]
files = ["linalg_zero"]
disallow_untyped_defs = true
disallow_any_unimported = false
no_implicit_optional = true
check_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true

# Module-specific ignores
[[tool.mypy.overrides]]
module = [
    "torch.*",
    "torchvision.*",
    "torchaudio.*",
    "deepspeed.*",
    "datasets.*",
    "trl.*",
    "sympy.*",
    "matplotlib.*",
    "distilabel.*",
    "math_verify.*",
    "verl.*",
    "argilla.*",
    "unsloth.*",
    "art",
    "art.*",
    "huggingface_hub",
    "huggingface_hub.*",
    "transformers",
    "transformers.*",
    "numpy",
    "numpy.*",
    "wandb",
    "wandb.*",
    "hydra",
    "hydra.*",
    "omegaconf",
    "omegaconf.*",
    "dotenv",
    "dotenv.*",
    "litellm",
    "litellm.*",
    "tenacity",
    "tenacity.*",
    "openai",
    "openai.*",
    "langfuse",
    "langfuse.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["linalg_zero.distillation.utils", "linalg_zero.distillation.scripts.push_debug_dataset", "linalg_zero.sft.model_utils", "linalg_zero.grpo.datagen", "linalg_zero.grpo.process_dataset", "linalg_zero.distillation.run", "linalg_zero.sft.utils", "linalg_zero.sft.tool_calling_accuracy"]
disable_error_code = ["attr-defined", "assignment", "operator"]

[[tool.mypy.overrides]]
module = ["linalg_zero.grpo.run_rl"]
ignore_errors = true

[[tool.mypy.overrides]]
module = ["linalg_zero.generator.analysis.analyse", "linalg_zero.sft.tool_evaluation"]
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "linalg_zero.distillation.scripts.validate_dataset",
    "linalg_zero.grpo.general_rm",
    "linalg_zero.grpo.rl_utils",
    "linalg_zero.grpo.scripts.run",
    "linalg_zero.sft.scripts.evaluate_merged_model",
    "linalg_zero.sft.tool_calling_accuracy",
    "linalg_zero.sft_train",
]
ignore_errors = true

[[tool.mypy.overrides]]
module = ["linalg_zero.grpo.agents.tool_calling_agent"]
disable_error_code = ["no-any-return", "attr-defined", "union-attr"]

[[tool.mypy.overrides]]
module = ["linalg_zero.grpo.envs.linear_algebra.tools.*"]
disable_error_code = ["no-any-return"]

[[tool.mypy.overrides]]
module = ["linalg_zero.grpo_train"]
disable_error_code = ["arg-type", "typeddict-item"]

[[tool.mypy.overrides]]
module = ["linalg_zero.grpo.scripts.eval_linalg"]
disable_error_code = ["arg-type", "typeddict-item"]

[[tool.mypy.overrides]]
module = ["linalg_zero.grpo.verify", "linalg_zero.grpo.linalg_zero_interaction"]
disable_error_code = ["no-any-return", "unused-ignore"]

[[tool.mypy.overrides]]
module = [
    "linalg_zero.distillation.launch_server",
]
disable_error_code = ["list-item"]

[[tool.mypy.overrides]]
module = "linalg_zero.sft.train"
disable_error_code = ["list-item", "union-attr", "operator", "arg-type"]


[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 119
fix = true

[tool.ruff.lint]
select = [
    # flake8-2020
    "YTT",
    # flake8-bandit
    "S",
    # flake8-bugbear
    "B",
    # flake8-builtins
    "A",
    # flake8-comprehensions
    "C4",
    # flake8-debugger
    "T10",
    # flake8-simplify
    "SIM",
    # isort
    "I",
    # mccabe
    "C90",
    # pycodestyle
    "E", "W",
    # pyflakes
    "F",
    # pygrep-hooks
    "PGH",
    # pyupgrade
    "UP",
    # ruff
    "RUF",
    # tryceratops
    "TRY",
]
ignore = [
    # LineTooLong
    "E501",
    # DoNotAssignLambda
    "E731",
    # Allow random module usage
    "S311",
    # Allow raise with long message usage
    "TRY003",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]
"linalg_zero/distillation/components/multi_turn_generation.py" = ["A002"]
"linalg_zero/distillation/components/multi_turn_generation_base.py" = ["A001", "PGH003", "S101"]
"linalg_zero/*" = ["S101"]
"linalg_zero/grpo/tau-bench/run_linalg.py" = ["E402"]
"linalg_zero/grpo_train.py" = ["E402"]
"linalg_zero/grpo/scripts/eval_linalg.py" = ["E402"]

[tool.ruff.format]
preview = true

[tool.coverage.report]
skip_empty = true

[tool.coverage.run]
branch = true
source = ["linalg_zero"]
omit = [
    # This file is a thin wrapper around the launch script, it is intended to be very simple.
    # It is excluded from the coverage report.
    "*/run_training.py",
    "*/metrics/accuracy.py",
    "*/trainers/zero_trainer.py",
    "*/models/simple_cnn.py",
    "*/distil.py",
    "*/generate.py",
    "*/sft.py",
]

# Generated with: semantic-release generate-config --pyproject >> pyproject.toml
[tool.semantic_release]
assets = []
build_command_env = []
commit_message = "chore(release): 📦 v{version} [skip ci]"
commit_parser = "conventional"
logging_use_named_masks = false
major_on_zero = true
allow_zero_version = true
repo_dir = "."
no_git_verify = false
tag_format = "v{version}"

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease_token = "rc"
prerelease = false

[tool.semantic_release.changelog]
exclude_commit_patterns = ["^chore.*"]
mode = "init"
insertion_flag = "<!-- version list -->"
template_dir = "templates"

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
output_format = "md"
mask_initial_release = false

[tool.semantic_release.changelog.environment]
block_start_string = "{%"
block_end_string = "%}"
variable_start_string = "{{"
variable_end_string = "}}"
comment_start_string = "{#"
comment_end_string = "#}"
trim_blocks = false
lstrip_blocks = false
newline_sequence = "\n"
keep_trailing_newline = false
extensions = []
autoescape = false

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "semantic-release <semantic-release>"

[tool.semantic_release.commit_parser_options]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
other_allowed_tags = ["build", "chore", "ci", "docs", "style", "refactor", "test"]
allowed_tags = ["feat", "fix", "perf", "build", "chore", "ci", "docs", "style", "refactor", "test"]
default_bump_level = 0
parse_squash_commits = false
ignore_merge_commits = false

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false
insecure = false

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true

[tool.pyright]
reportArgumentType = false
reportAny = false
reportExplicitAny = false
reportUnknownParameterType = false
reportUnknownVariableType = false
reportUnknownMemberType = false
reportMissingTypeStubs = false
reportAttributeAccessIssue = false
reportUnusedExpression = false
reportAssignmentType = false
